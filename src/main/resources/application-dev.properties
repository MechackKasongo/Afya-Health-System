# Profil dev : H2 en mémoire, sans Flyway ni Oracle — démarrage local sans dépendances BD externes.
#
# Bootstrap compte administrateur si absent (sans variables d'environnement). En prod utilisez APP_BOOTSTRAP_*.
app.bootstrap.username=${APP_BOOTSTRAP_USERNAME:admin}
app.bootstrap.password=${APP_BOOTSTRAP_PASSWORD:Admin@12345}
app.jwt.access-secret=${JWT_ACCESS_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+-}
spring.datasource.url=jdbc:h2:mem:afyadev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
