# Profil oracle : même base que développement cible contre XEPDB1 + migrations Flyway (FK).
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=afya
spring.datasource.password=afya123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false

# Flyway : FK Oracle (V1/V2). Désactiver si 1re base vide au boot Hibernate : SPRING_FLYWAY_ENABLED=false
# baseline-on-migrate=false : avec tables déjà créées par Hibernate, un baseline évite souvent V1/JDBC exécuté.
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration/oracle
logging.level.org.flywaydb=INFO
