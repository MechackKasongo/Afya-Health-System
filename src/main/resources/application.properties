spring.application.name=afya-health-system

# Origines CORS autorisées pour l’UI (ex. http://localhost:5173). Séparer par des virgules en prod.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
server.port=8090
# dev = H2 local (voir application-dev.properties). Pour Oracle + Flyway : SPRING_PROFILES_ACTIVE=oracle
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

management.endpoints.web.exposure.include=health,info

# OpenAPI (springdoc) — Swagger UI: http://localhost:8090/swagger-ui/index.html
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.tagsSorter=alpha

app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.jwt.access-expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:3600}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:2592000}
app.bootstrap.username=${APP_BOOTSTRAP_USERNAME}
app.bootstrap.full-name=${APP_BOOTSTRAP_FULL_NAME:Administrateur AFYA}
app.bootstrap.password=${APP_BOOTSTRAP_PASSWORD}
app.bootstrap.roles=${APP_BOOTSTRAP_ROLES:ROLE_ADMIN}
# Première création du compte initial (voir BootstrapAccountProvisioner). Mettre à false après import utilisateurs réel (ex. prod Oracle).
app.bootstrap.auto-provision=${APP_BOOTSTRAP_AUTO_PROVISION:true}

# Plaintext credential log (admin export). Restrict filesystem permissions in production.
app.users.credentials-log-path=${APP_USERS_CREDENTIALS_LOG:./data/generated-user-credentials.txt}

# Throttle brute-force on POST /api/v1/auth/login (per resolved client IP, in-memory)
app.security.login-rate-limit.enabled=true
app.security.login-rate-limit.requests-per-minute=${APP_LOGIN_RATE_LIMIT_PER_MINUTE:15}
app.security.login-rate-limit.refill-duration-minutes=${APP_LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}
app.security.login-rate-limit.trust-forwarded-for-header=${APP_LOGIN_RATE_LIMIT_TRUST_XFF:false}

# Politique de complexité des mots de passe saisis par l’utilisateur ; les mots de passe générés restent ≥ generated-min-length.
app.security.password-policy.user-min-length=${APP_PASSWORD_POLICY_USER_MIN_LENGTH:11}
app.security.password-policy.generated-min-length=${APP_PASSWORD_POLICY_GENERATED_MIN_LENGTH:12}
app.security.password-policy.require-uppercase=${APP_PASSWORD_POLICY_REQUIRE_UPPER:true}
app.security.password-policy.require-lowercase=${APP_PASSWORD_POLICY_REQUIRE_LOWER:true}
app.security.password-policy.require-digit=${APP_PASSWORD_POLICY_REQUIRE_DIGIT:true}
app.security.password-policy.require-special=${APP_PASSWORD_POLICY_REQUIRE_SPECIAL:true}

# Verrouillage compte après tentatives échouées sur un utilisateur existant (seuil atteint après le dernier refus).
app.security.login-lockout.enabled=${APP_LOGIN_LOCKOUT_ENABLED:true}
app.security.login-lockout.max-attempts=${APP_LOGIN_LOCKOUT_MAX_ATTEMPTS:8}
app.security.login-lockout.lock-duration-minutes=${APP_LOGIN_LOCKOUT_MINUTES:15}
