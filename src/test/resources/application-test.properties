spring.datasource.url=jdbc:h2:mem:afyatestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

app.jwt.access-secret=0123456789012345678901234567890123456789012345678901234567890123
app.jwt.refresh-secret=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789+-
app.jwt.access-expiration-seconds=3600
app.jwt.refresh-expiration-seconds=2592000
app.bootstrap.username=admin
app.bootstrap.full-name=Administrateur AFYA
app.bootstrap.password=Admin@12345
app.bootstrap.roles=ROLE_ADMIN

# Tests : pas de blocage après enchaînements de MockMvc répétés
app.security.login-rate-limit.enabled=false
# Tests : ne pas verrouiller admin pendant les suites MockMvc (voir LoginLockoutIntegrationTest isolé)
app.security.login-lockout.enabled=false
